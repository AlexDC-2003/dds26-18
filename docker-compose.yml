version: "3"
services:

  gateway:
    image: nginx:1.25-bookworm
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  order-service:
    build: ./order
    image: order:latest
    restart: always
    environment:
      - GATEWAY_URL=http://gateway:80
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_STOCK_COMMANDS_TOPIC=stock.commands
      - KAFKA_REPLIES_TOPICS=stock.replies,payment.replies
      - KAFKA_PAYMENT_COMMANDS_TOPIC=payment.commands
      - INTERNAL_TRANSPORT=kafka  
      - KAFKA_REQUEST_TIMEOUT_SEC=2
      - KAFKA_ORDER_GROUP_ID=order-service
    command: hypercorn -b 0.0.0.0:5000 --workers 1 app:app
    env_file:
      - env/order_redis.env
    depends_on:
      order-db:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  order-db:
    image: redis:7.2-bookworm
    restart: always
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes
    volumes:
      - order-db-data:/data

  stock-service:
    build: ./stock
    image: stock:latest
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_STOCK_COMMANDS_TOPIC=stock.commands
      - KAFKA_STOCK_REPLIES_TOPIC=stock.replies
      - KAFKA_ORDER_EVENTS_TOPIC=order.events
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      stock-db:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  stock-db:
    image: redis:7.2-bookworm
    restart: always
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes
    volumes:
      - stock-db-data:/data

  payment-service:
    build: ./payment
    image: user:latest
    restart: always
    environment:
      - INTERNAL_TRANSPORT=kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_PAYMENT_COMMANDS_TOPIC=payment.commands
      - KAFKA_PAYMENT_REPLIES_TOPIC=payment.replies
      - KAFKA_PAYMENT_GROUP_ID=payment-service
      - KAFKA_ORDER_EVENTS_TOPIC=order.events
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/payment_redis.env
    depends_on:
      payment-db:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully

  payment-db:
    image: redis:7.2-bookworm
    restart: always
    command: redis-server --requirepass redis --maxmemory 512mb --appendonly yes
    volumes:
      - payment-db-data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_NUM_PARTITIONS: ${KAFKA_PARTITIONS:-1}
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./create_topics.sh:/create_topics.sh:ro
    entrypoint: [ "/bin/bash", "-c", "tr -d '\\r' < /create_topics.sh | bash" ]
    restart: "no"
    
  watchdog:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: |
      sh -c '
      while true; do
        for service in dds26-18-stock-service-1 dds26-18-order-service-1 dds26-18-payment-service-1 dds26-18-stock-db-1 dds26-18-order-db-1 dds26-18-payment-db-1; do
          STATUS=$$(docker inspect $$service --format="{{.State.Status}}" 2>/dev/null)
          if [ "$$STATUS" = "exited" ] || [ "$$STATUS" = "dead" ]; then
            echo "$$service is down, restarting..."
            docker start $$service
          fi
        done
        sleep 2
      done
      '
    restart: always

volumes:
  order-db-data:
  stock-db-data:
  payment-db-data: